version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-josh_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-pass123}
      POSTGRES_DB: ${DB_NAME:-findmybites_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
