name: FindMyBites CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t findmybites-backend .

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3 # Use this specific version
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "Successfully connected to server!"
            mkdir -p ~/findmybitesin
            cd ~/findmybitesin
            # If it's the first time, we clone; otherwise, we pull
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            docker-compose down
            docker-compose up --build -d
            docker image prune -f
